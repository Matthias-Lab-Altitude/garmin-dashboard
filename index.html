<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You vs. You — Trainingsdashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-elevated: #fdf9f7;
    --card: #ffffff;
    --card-border: #f0e0d8;
    --text: #201a1d;
    --text-muted: #948a8d;
    --topo: #ff7a45;
    --pink: #ff4f9a;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background-color: var(--bg);
    padding: 20px;
  }
  h1 { font-family: var(--font-display); text-transform: uppercase; }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    padding: 20px;
    border-radius: 8px;
    margin-top: 15px;
  }
</style>
</head>
<body>

  <h1>You vs. You — Trainingsdashboard</h1>
  <div id="status-output" class="card">Lade Daten...</div>

  <script>
    // Korrigierte Lade-Logik für deine JSON-Dateien
    async function loadDashboardData() {
      const output = document.getElementById('status-output');
      
      try {
        // Safe Fetch: Liest JSON aus dem data/-Ordner oder gibt ein Fallback zurück
        const safeFetch = async (file, fallback) => {
          try {
            const res = await fetch(`./data/${file}`);
            if (!res.ok) return fallback;
            return await res.json();
          } catch (e) {
            console.warn(`Datei ${file} konnte nicht geladen werden:`, e);
            return fallback;
          }
        };

        // Parallel alle benötigten Dateien abrufen
        const [activities, status, health, vo2History] = await Promise.all([
          safeFetch('activities.json', []),
          safeFetch('status.json', {}),
          safeFetch('health.json', []),
          safeFetch('vo2max_history.json', [])
        ]);

        console.log("Geladene Daten:", { activities, status, health, vo2History });

        // Ausgabe auf der Seite aktualisieren
        output.innerHTML = `
          <h3>Daten erfolgreich geladen!</h3>
          <p><strong>Aktivitäten:</strong> ${activities.length} Einträge</p>
          <p><strong>VO2max:</strong> ${status.vo2max?.value || 'k.A.'}</p>
          <p><strong>Gesundheitstage:</strong> ${health.length} Tage aufgezeichnet</p>
        `;

      } catch (err) {
        console.error("Fehler beim Laden des Dashboards:", err);
        output.innerHTML = `<p style="color: red;">Fehler beim Laden der Daten. Siehe Konsole für Details.</p>`;
      }
    }

    // Beim Laden der Seite ausführen
    document.addEventListener("DOMContentLoaded", loadDashboardData);
  </script>

</body>
</html>
